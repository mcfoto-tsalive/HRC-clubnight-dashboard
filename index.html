<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Howick Rifle Club - Club Night</title>
<style>
  :root{--bg:#070707;--panel:#151515;--line:#333;--text:#f6f6f6;--muted:#bfbfbf;--accent:#0b83bd;--done:#153d24;--gold:#f6c51f;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;}
  header{display:grid;grid-template-columns:110px 1fr auto;gap:22px;align-items:center;padding:18px 28px;background:#000;border-bottom:4px solid var(--accent)}
  .logo{width:100px;height:100px;object-fit:contain}.title h1{margin:0;font-size:42px;letter-spacing:1px}.title .sub{font-size:22px;color:var(--muted);margin-top:6px}
  .controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.controls button,.controls select{font-size:18px;border:1px solid #555;border-radius:8px;padding:10px 12px;background:#1f1f1f;color:var(--text)}.controls button.active{background:var(--accent)}
  main{padding:20px 28px}.meta{display:flex;gap:22px;align-items:center;justify-content:space-between;margin-bottom:16px;color:var(--muted);font-size:18px}.updated{font-size:16px}
  .sections{display:grid;grid-template-columns:1fr 1fr;gap:18px}.section{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}.section h2{margin:0;padding:12px 16px;background:#050505;font-size:28px;border-bottom:1px solid var(--line)}
  table{width:100%;border-collapse:collapse;table-layout:fixed} th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:center;font-size:22px} th{font-size:16px;color:#ddd;background:#101010}td.name{text-align:left;font-weight:700;font-size:24px}td.mound{width:60px;color:var(--gold);font-weight:800}.empty td{color:#555}.done{background:var(--done)}
  .small{font-size:15px;color:var(--muted);margin-top:14px}.error{color:#ff8a8a;font-weight:bold}.hidden{display:none}.mobile-card{display:none}
  @media(max-width:900px){header{grid-template-columns:70px 1fr}.logo{width:66px;height:66px}.controls{grid-column:1/3;justify-content:flex-start}.title h1{font-size:27px}.title .sub{font-size:17px}.sections{grid-template-columns:1fr}th,td{font-size:17px;padding:8px 5px}td.name{font-size:18px}.section h2{font-size:22px}main{padding:12px}.meta{font-size:15px;align-items:flex-start;gap:8px;flex-direction:column}}
</style>
</head>
<body>
<header>
  <img class="logo" src="hrc-logo.png" alt="Howick Rifle Club logo">
  <div class="title"><h1>HOWICK RIFLE CLUB</h1><div class="sub">Club Night Digital Squad Sheet</div></div>
  <div class="controls"><span>Detail</span><button data-detail="1" class="active">1</button><button data-detail="2">2</button><button data-detail="3">3</button><button data-detail="4">4</button><button data-detail="5">5</button></div>
</header>
<main>
  <div class="meta"><div id="dateLine">Date: —</div><div class="updated" id="updatedLine">Loading scores…</div></div>
  <div id="error" class="error hidden"></div>
  <div class="sections">
    <section class="section"><h2>UPSTAIRS — Mounds 1–8</h2><table><thead><tr><th>Mound</th><th>Name</th><th>GD</th><th>Card 1</th><th>Card 2</th><th>Total</th></tr></thead><tbody id="upstairs"></tbody></table></section>
    <section class="section"><h2>DOWNSTAIRS — Mounds 9–16</h2><table><thead><tr><th>Mound</th><th>Name</th><th>GD</th><th>Card 1</th><th>Card 2</th><th>Total</th></tr></thead><tbody id="downstairs"></tbody></table></section>
  </div>
  <div class="small">Green row = shooter has a total entered or calculated. Page refreshes automatically every 30 seconds.</div>
</main>
<script>
// PASTE YOUR GOOGLE SHEETS CSV PUBLISHED LINK HERE.
// Leave as scores-template.csv for local testing.
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVPbSb6y773wt9gaLEdNrp0Pb2QyZOUvPV-gtmDG0Kuh0k-XFy0XGXYoM9oR5xy5jBnw69gTz4R0wh/pub?output=csv';
const REFRESH_MS = 30000;
let currentDetail = '1';
let allRows = [];

function parseCSV(text){
  const rows=[]; let row=[], cell='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"' && q && n==='"'){cell+='"'; i++;}
    else if(c==='"'){q=!q;}
    else if(c===',' && !q){row.push(cell); cell='';}
    else if((c==='\n'||c==='\r') && !q){ if(cell || row.length){row.push(cell); rows.push(row); row=[]; cell='';} if(c==='\r'&&n==='\n') i++;}
    else cell+=c;
  }
  if(cell || row.length){row.push(cell); rows.push(row);}
  const headers=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.some(x=>String(x).trim()!=='')).map(r=>Object.fromEntries(headers.map((h,i)=>[h,(r[i]||'').trim()])));
}
function scoreValue(s){
  if(!s) return 0; const m=String(s).match(/^(\d+(?:\.\d+)?)/); return m?Number(m[1]):0;
}
function calcTotal(r){
  if(r.Total) return r.Total;
  if(r.Card1 && r.Card2) return String(scoreValue(r.Card1)+scoreValue(r.Card2));
  if(r.Card1 && !r.Card2) return r.Card1;
  return '';
}
function blankRows(position){
  const start=position==='Upstairs'?1:9; return Array.from({length:8},(_,i)=>({Mound:String(start+i),Position:position,Name:'',Grade:'',Card1:'',Card2:'',Total:''}));
}
function rowHtml(r){
  const total=calcTotal(r); const hasName=!!r.Name; const done=!!total && hasName;
  return `<tr class="${hasName?'':'empty'} ${done?'done':''}"><td class="mound">${r.Mound||''}</td><td class="name">${r.Name||''}</td><td>${r.Grade||''}</td><td>${r.Card1||''}</td><td>${r.Card2||''}</td><td><b>${total}</b></td></tr>`;
}
function render(){
  const detailRows=allRows.filter(r=>String(r.Detail).trim()===currentDetail);
  const date=(detailRows.find(r=>r.Date)?.Date)||'—';
  document.getElementById('dateLine').textContent=`Date: ${date}   |   Detail: ${currentDetail}`;
  ['Upstairs','Downstairs'].forEach(pos=>{
    const base=blankRows(pos);
    const rows=base.map(b=>detailRows.find(r=>String(r.Mound)===String(b.Mound))||b);
    document.getElementById(pos.toLowerCase()).innerHTML=rows.map(rowHtml).join('');
  });
}
async function load(){
  try{
    const res=await fetch(CSV_URL + (CSV_URL.includes('?')?'&':'?') + 'cacheBust=' + Date.now());
    if(!res.ok) throw new Error('Could not load CSV');
    allRows=parseCSV(await res.text());
    document.getElementById('error').classList.add('hidden');
    document.getElementById('updatedLine').textContent='Updated: '+new Date().toLocaleTimeString();
    render();
  }catch(e){document.getElementById('error').textContent='Scoreboard problem: '+e.message;document.getElementById('error').classList.remove('hidden');}
}
document.querySelectorAll('[data-detail]').forEach(b=>b.addEventListener('click',()=>{currentDetail=b.dataset.detail;document.querySelectorAll('[data-detail]').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();}));
load(); setInterval(load, REFRESH_MS);
</script>
</body>
</html>
